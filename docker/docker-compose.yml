version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-vector-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: defect-rag-api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DEVICE=cpu
    volumes:
      - shared_data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    container_name: defect-rag-frontend
    ports:
      - "7860:7860"
    environment:
      - BACKEND_URL=http://api:8000
    volumes:
      - shared_data:/app/data
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_data:
  shared_data:
